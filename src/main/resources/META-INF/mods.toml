modLoader = "javafml"
loaderVersion = "${forgeLoaderRange}"
license = "All Rights Reserved"

[[mixins]]
config = "${id}.mixins.json"

[[mods]]
modId = "${id}"
version = "${version}"
displayName = "${name}"
authors = "${authors}"
description = "${description}"

[[dependencies.${id}]]
modId = "forge"
mandatory = true
versionRange = "${forgeVersionRange}"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "minecraft"
mandatory = true
versionRange = "[${minecraftVersion},1.20.2)"
ordering = "NONE"
side = "BOTH"

[[dependencies.${id}]]
modId = "jei"
mandatory = true
versionRange = "[${jeiVersion},)"
ordering = "AFTER"
side = "CLIENT"